<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donald's Bukka | Taste of Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        .menu-card { transition: transform 0.3s ease; }
        .menu-card:hover { transform: translateY(-8px); }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                              url('https://images.unsplash.com/photo-1596560548486-f849c716298e?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
        }        .filter-btn.active-filter {
            background-color: #ea580c;
            color: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.4), 0 4px 6px -2px rgba(234, 88, 12, 0.2);
            border-color: transparent;
        }    </style>
</head>
<body class="bg-orange-50 text-gray-900">

    <header class="relative h-[350px] flex flex-col justify-center items-center text-center overflow-hidden hero-bg">
        <div class="relative z-10 p-6">
            <h1 class="text-5xl md:text-6xl font-extrabold text-white mb-2">Donald's <span class="text-orange-500">Bukka</span></h1>
            <p class="text-orange-100 text-lg font-medium tracking-wide">Authentic Nigerian Delicacies Delivered</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold mb-4">Our Menu</h2>
            <div id="filter-container" class="flex flex-wrap justify-center gap-3 mt-6">
                <button onclick="filterMenu('All', this)" class="filter-btn px-5 py-2 bg-white border border-orange-200 hover:bg-orange-100 rounded-full font-semibold transition">All</button>
                <button onclick="filterMenu('Signature', this)" class="filter-btn px-5 py-2 bg-white border border-orange-200 hover:bg-orange-100 rounded-full font-semibold transition">Signature</button>
                <button onclick="filterMenu('Local', this)" class="filter-btn px-5 py-2 bg-white border border-orange-200 hover:bg-orange-100 rounded-full font-semibold transition">Local</button>
                <button onclick="filterMenu('Drinks', this)" class="filter-btn px-5 py-2 bg-white border border-orange-200 hover:bg-orange-100 rounded-full font-semibold transition">Drinks</button>
            </div>
        </div>

        <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        const menu = [
            { name: "Pounded Yam & Egusi", price: "₦2,500", tag: "Signature", img: "images/Pounded Yam & Egusi.jpg" },
            { name: "Jollof Rice & Turkey", price: "₦3,500", tag: "Signature", img: "images/Jollof Rice & Turkey.jpg" },
            { name: "Amala & Ewedu", price: "₦2,000", tag: "Local", img: "images/Amala & Ewedu.webp" },
            { name: "Banga Soup & Starch", price: "₦2,800", tag: "Local", img: "images/Banga Soup & Starch.jpg" },
            { name: "Efo Riro", price: "₦1,500", tag: "Local", img: "images/Efo Riro.jpg" },
            { name: "Chapman Refresh", price: "₦1,200", tag: "Drinks", img: "images/fruit-juice.jpg" }
        ];

        function filterMenu(category, button) {
            const grid = document.getElementById('menu-grid');
            const filtered = category === 'All' ? menu : menu.filter(item => item.tag === category);

            if (button) {
                document.querySelectorAll('#filter-container .filter-btn').forEach(btn => {
                    btn.classList.remove('active-filter');
                });
                button.classList.add('active-filter');
            }
            
            grid.innerHTML = filtered.map(item => `
                <div class="menu-card bg-white p-6 rounded-2xl shadow-sm border border-orange-100 hover:shadow-lg transition">
                    <div class="w-full h-48 mb-4 overflow-hidden rounded-xl">
                        <img src="${item.img}" alt="${item.name}" class="w-full h-full object-cover">
                    </div>
                    <div class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-bold w-max mb-4">${item.tag}</div>
                    <h3 class="text-xl font-bold mb-2">${item.name}</h3>
                    <p class="text-2xl font-extrabold text-orange-600 mb-4">${item.price}</p>
                    <button class="w-full py-2 border-2 border-orange-600 text-orange-600 rounded-lg hover:bg-orange-600 hover:text-white transition font-semibold">Add to Order</button>
                </div>
            `).join('');
        }

        filterMenu('All', document.querySelector('#filter-container .filter-btn'));
    </script>
</body>
</html>
